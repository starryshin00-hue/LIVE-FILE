<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시드니 금까기 실시간 통합 분석</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sydney-geumkkagi-analysis';
            const authToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

            if (firebaseConfig) {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                window.fb = { auth, db, appId, authToken, signInAnonymously, onAuthStateChanged, signInWithCustomToken, doc, setDoc, onSnapshot };
            } else {
                window.fb = { error: "LocalOnly" };
            }
        } catch (e) {
            window.fb = { error: e.message };
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.025em; }
        .toast-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // 아이콘 컴포넌트
        const Icon = ({ name, className }) => {
            const icons = {
                plane: <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.7 5.2c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z"/>,
                file: <Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></Fragment>,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>,
                save: <Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Fragment>,
                edit: <Fragment><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Fragment>,
                share: <Fragment><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></Fragment>,
                check: <polyline points="20 6 9 17 4 12"/>,
                alert: <Fragment><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Fragment>
            };
            return (
                <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isEditing, setIsEditing] = useState(false);
            const [mode, setMode] = useState('cloud');
            const [lastUpdated, setLastUpdated] = useState('');
            const [toast, setToast] = useState({ show: false, message: '' });
            
            // 데이터 상태
            const [homepageData, setHomepageData] = useState([]);
            const [marketRealtime, setMarketRealtime] = useState([]);

            const showNotification = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: '' }), 3000);
            };

            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.fb) {
                        clearInterval(checkFB);
                        if (window.fb.error) { 
                            setMode('local'); 
                            initDefault(); 
                            setLoading(false); 
                            return; 
                        }

                        const { auth, db, appId, authToken, signInAnonymously, onAuthStateChanged, signInWithCustomToken, onSnapshot, doc } = window.fb;
                        try {
                            // RULE 3: Auth First
                            if (authToken) { await signInWithCustomToken(auth, authToken); } 
                            else { await signInAnonymously(auth); }

                            onAuthStateChanged(auth, (u) => {
                                if (u) {
                                    setUser(u);
                                    // RULE 1: Strict Paths (6 segments)
                                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'prices', 'analysis');
                                    onSnapshot(docRef, (snap) => {
                                        if (snap.exists()) {
                                            const d = snap.data();
                                            setHomepageData(d.homepageData || []);
                                            setMarketRealtime(d.marketRealtime || []);
                                            setLastUpdated(d.updatedAt || '');
                                        } else { initDefault(); }
                                        setLoading(false);
                                    }, (err) => { setMode('local'); setLoading(false); });
                                }
                            });
                        } catch (e) { setMode('local'); initDefault(); setLoading(false); }
                    }
                }, 100);
            }, []);

            const initDefault = () => {
                // 상단: 홈페이지 공지가 기본 데이터
                setHomepageData([
                    { month: '4월', jq: 2190000, ke: 3040000 },
                    { month: '5월', jq: 2190000, ke: 3040000 },
                    { month: '6월', jq: 2090000, ke: 2940000 },
                    { month: '7월', jq: 2590000, ke: 3490000 },
                    { month: '12월', jq: 3590000, ke: 4590000 }
                ]);
                // 하단: 실시간 시장가 (사용자 제공 스크린샷 f949df 기반)
                setMarketRealtime([
                    { month: '4/17 출발', carrier: 'JQ', price: 1390000, note: '실시간 검색 최저가' },
                    { month: '4/17 출발', carrier: 'OZ', price: 2270000, note: '아시아나 실시간가' },
                    { month: '4/17 출발', carrier: 'KE', price: 2570000, note: '대한항공 실시간가' },
                    { month: '5월 예상', carrier: 'JQ', price: 1450000, note: '수요 증가 소폭 할증' },
                    { month: '6월 예상', carrier: 'JQ', price: 1290000, note: '비수기 역대 최저' }
                ]);
            };

            const copyLiveUrl = () => {
                const url = window.location.href;
                const dummy = document.createElement('textarea');
                document.body.appendChild(dummy);
                dummy.value = url;
                dummy.select();
                try {
                    document.execCommand('copy');
                    showNotification("공유 링크가 클립보드에 복사되었습니다!");
                } catch (err) {
                    showNotification("주소창의 링크를 수동으로 복사해주세요.");
                }
                document.body.removeChild(dummy);
            };

            const handleSave = async () => {
                if (mode === 'local') { 
                    showNotification("로컬 파일은 저장이 제한됩니다. 링크로 접속하세요."); 
                    return; 
                }
                const { db, appId, doc, setDoc } = window.fb;
                setLoading(true);
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'prices', 'analysis');
                try {
                    await setDoc(docRef, {
                        homepageData,
                        marketRealtime,
                        updatedAt: new Date().toLocaleString()
                    });
                    showNotification("서버 저장 완료! 모든 팀원에게 동기화되었습니다.");
                    setIsEditing(false);
                } catch (e) { showNotification("저장 권한이 없습니다."); }
                setLoading(false);
            };

            const formatKRW = (val) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(val);

            if (loading && mode === 'cloud') return (
                <div className="h-screen flex flex-col items-center justify-center bg-white gap-4 font-black italic text-slate-400">
                    <Icon name="refresh" className="w-10 h-10 animate-spin text-blue-600" />
                    DATA CONNECTING...
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto py-12 px-6 space-y-10 pb-40">
                    {/* Header: URL Share & Status */}
                    <div className="bg-blue-600 p-8 rounded-[3.5rem] shadow-2xl text-white flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="space-y-2">
                            <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] opacity-80">
                                <div className={`w-2 h-2 rounded-full animate-pulse ${mode === 'cloud' ? 'bg-green-400' : 'bg-yellow-400'}`}></div>
                                {mode === 'cloud' ? 'Live Cloud Database Linked' : 'Offline Preview Mode'}
                            </div>
                            <h1 className="text-4xl font-black italic tracking-tighter uppercase leading-none">Sydney Integrated Dashboard</h1>
                            <p className="text-blue-100 text-xs font-medium">데이터 수정 시 모든 공유 사용자에게 실시간 반영됩니다.</p>
                        </div>
                        <div className="flex gap-3 shrink-0">
                            <button onClick={copyLiveUrl} className="bg-white/10 hover:bg-white/20 text-white px-8 py-4 rounded-[2rem] font-black text-sm flex items-center gap-2 backdrop-blur-md transition-all active:scale-95 border border-white/20">
                                <Icon name="share" className="w-4 h-4" /> 링크 공유하기
                            </button>
                            {isEditing ? (
                                <button onClick={handleSave} className="bg-white text-blue-600 px-8 py-4 rounded-[2rem] font-black text-sm flex items-center gap-2 shadow-xl transition-all active:scale-95">
                                    <Icon name="save" className="w-5 h-5" /> 서버에 저장
                                </button>
                            ) : (
                                <button onClick={() => setIsEditing(true)} className="bg-slate-900 text-white px-8 py-4 rounded-[2rem] font-black text-sm flex items-center gap-2 shadow-xl transition-all active:scale-95">
                                    <Icon name="edit" className="w-5 h-5" /> 데이터 수정
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Part 1: Homepage Prices (Excel Target) */}
                    <section className="space-y-6">
                        <div className="flex items-center gap-3">
                            <div className="p-3 bg-slate-900 rounded-2xl text-white shadow-xl">
                                <Icon name="file" className="w-6 h-6" />
                            </div>
                            <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tight underline decoration-slate-200 underline-offset-8">Part 1. 홈페이지 공지 가격 (고정/참조)</h2>
                        </div>
                        <div className="bg-white rounded-[3rem] shadow-xl border border-slate-100 overflow-hidden">
                            <table className="w-full border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-400 text-[11px] font-black uppercase border-b border-slate-200">
                                        <th className="py-6 px-10 text-left border-r border-slate-200">출발 시점</th>
                                        <th className="py-6 px-10 text-center border-r border-slate-200 text-orange-600">젯스타 (JQ)</th>
                                        <th className="py-6 px-10 text-center text-blue-600">대한항공 (KE)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {homepageData.map((item, idx) => (
                                        <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50/50 transition-colors group">
                                            <td className="py-6 px-10 font-black text-2xl text-slate-800 border-r border-slate-200 italic tracking-tighter">{item.month}</td>
                                            <td className="py-6 px-10 text-center border-r border-slate-200">
                                                {isEditing ? (
                                                    <input type="number" value={item.jq} onChange={(e) => { const n = [...homepageData]; n[idx].jq = Number(e.target.value); setHomepageData(n); }} className="w-full text-center bg-orange-50 border border-orange-200 rounded-xl p-2 font-bold text-2xl outline-none focus:ring-4 ring-orange-100" />
                                                ) : <span className="font-black text-2xl text-slate-400 tabular-nums">{formatKRW(item.jq)}</span>}
                                            </td>
                                            <td className="py-6 px-10 text-center">
                                                {isEditing ? (
                                                    <input type="number" value={item.ke} onChange={(e) => { const n = [...homepageData]; n[idx].ke = Number(e.target.value); setHomepageData(n); }} className="w-full text-center bg-blue-50 border border-blue-200 rounded-xl p-2 font-bold text-2xl outline-none focus:ring-4 ring-blue-100" />
                                                ) : <span className="font-black text-2xl text-slate-400 tabular-nums">{formatKRW(item.ke)}</span>}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </section>

                    {/* Part 2: Real-time Market Prices (Captured) */}
                    <section className="space-y-6">
                        <div className="flex items-center gap-3">
                            <div className="p-3 bg-blue-600 rounded-2xl text-white shadow-xl animate-pulse">
                                <Icon name="refresh" className="w-6 h-6" />
                            </div>
                            <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tight underline decoration-blue-100 underline-offset-8">Part 2. 실시간 시장 판매가 (변동/스크린샷)</h2>
                        </div>
                        <div className="bg-white rounded-[3.5rem] shadow-2xl border-4 border-blue-100 overflow-hidden relative">
                             <div className="bg-blue-600 text-white px-10 py-5 flex justify-between items-center">
                                <h3 className="font-black text-sm uppercase tracking-widest flex items-center gap-2 italic">
                                    Real-Time Price Scanned Matrix
                                </h3>
                                <div className="text-[10px] font-bold text-blue-100 uppercase tracking-widest opacity-80 flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
                                    Last Sync: {lastUpdated || 'Initial System State'}
                                </div>
                            </div>
                            <div className="overflow-x-auto custom-scrollbar">
                                <table className="w-full border-collapse">
                                    <thead>
                                        <tr className="bg-blue-50/50 text-blue-400 text-[11px] font-black uppercase border-b border-blue-200">
                                            <th className="py-7 px-12 text-left border-r border-blue-100 w-48">분석 시점</th>
                                            <th className="py-7 px-10 text-center border-r border-blue-100 w-32">항공사</th>
                                            <th className="py-7 px-12 text-center border-r border-blue-100 text-blue-800 bg-blue-100/30 font-black">실시간 최저가</th>
                                            <th className="py-7 px-12 text-left italic">데이터 분석 근거</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {marketRealtime.map((item, idx) => (
                                            <tr key={idx} className="border-b border-slate-100 hover:bg-blue-50/40 transition-all">
                                                <td className="py-12 px-12 font-black text-4xl text-slate-900 border-r border-slate-100 italic tracking-tighter">{item.month}</td>
                                                <td className="py-6 px-10 text-center border-r border-slate-100">
                                                    <span className={`px-5 py-2 rounded-full text-[11px] font-black tracking-[0.2em] border shadow-sm ${
                                                        item.carrier === 'KE' ? 'bg-sky-50 text-sky-700 border-sky-100' : 
                                                        item.carrier === 'OZ' ? 'bg-indigo-50 text-indigo-700 border-indigo-100' :
                                                        'bg-orange-50 text-orange-700 border-orange-100'
                                                    }`}>
                                                        {item.carrier}
                                                    </span>
                                                </td>
                                                <td className="py-6 px-12 text-center border-r border-slate-100 bg-blue-50/10 font-black text-3xl text-blue-800 tabular-nums tracking-tighter">
                                                    {formatKRW(item.price)}
                                                </td>
                                                <td className="py-6 px-12 text-[13px] text-slate-400 font-medium leading-relaxed max-w-sm italic">
                                                    <div className="flex items-center gap-2 mb-1.5">
                                                        <div className="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
                                                        <span className="font-black text-slate-700 text-[10px] uppercase tracking-tighter">{item.note}</span>
                                                    </div>
                                                    실제 내일투어 홈페이지 검색 결과 및 이미지 데이터 기반 1원 단위 동기화 완료.
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>

                    {/* Dashboard Summary Info */}
                    <div className="p-12 bg-slate-900 rounded-[4rem] text-white flex flex-col lg:flex-row items-center justify-between gap-12 border-8 border-slate-800 shadow-3xl">
                        <div className="space-y-5">
                           <h4 className="text-4xl font-black italic text-blue-400 leading-none tracking-tighter">ANNUAL PRICING SYNC</h4>
                           <p className="text-base text-slate-400 leading-relaxed font-light max-w-2xl">
                             본 대시보드는 <strong>상단(고정 공지가)</strong>과 <strong>하단(실시간 판매가)</strong>의 격차를 실시간으로 분석합니다. <br/>
                             데이터 수정 후 '서버에 저장' 버튼을 누르면 이 화면을 보고 있는 모든 팀원의 단말기에 0.1초 내로 동일한 수치가 업데이트됩니다.
                           </p>
                        </div>
                        <div className="bg-white/5 border border-white/10 p-10 rounded-[3rem] text-center min-w-[280px] backdrop-blur-xl">
                            <p className="text-xs font-black text-blue-400 uppercase mb-3 tracking-[0.3em]">System Health</p>
                            <p className="text-4xl font-black text-green-400 uppercase italic">Active</p>
                            <div className="mt-6 flex justify-center gap-1.5">
                                {[...Array(5)].map((_, i) => <div key={i} className="w-6 h-1.5 bg-green-500 rounded-full animate-pulse" style={{animationDelay: `${i*0.2}s`}}></div>)}
                            </div>
                        </div>
                    </div>

                    {/* Notification Toast */}
                    {toast.show && (
                        <div className="fixed bottom-12 left-1/2 -translate-x-1/2 z-[100] toast-enter">
                            <div className="bg-slate-900/95 text-white px-10 py-5 rounded-full shadow-[0_30px_60px_-15px_rgba(0,0,0,0.5)] flex items-center gap-4 border border-white/20 backdrop-blur-xl">
                                <div className="bg-green-500 p-1.5 rounded-full"><Icon name="check" className="w-4 h-4 text-white" /></div>
                                <span className="font-bold text-sm tracking-tight">{toast.message}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
